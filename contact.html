<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=yes">
    <title>Contact Taste Tour</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .contact-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .contact-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            width: 100%;
            max-width: 300px;
        }

        .contact-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.1rem;
        }

        .phone-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 1.1rem 1.5rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .phone-button:active {
            transform: scale(0.97);
        }

        .sms-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.85rem 1.5rem;
            background: transparent;
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            border: 2px solid var(--accent-primary);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s, color 0.2s;
        }

        .sms-button:active {
            background: rgba(255, 138, 0, 0.08);
        }

        .phone-icon {
            width: 22px;
            height: 22px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .contact-desc {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .copy-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            width: 100%;
            padding: 0.65rem 1rem;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 10px;
            border: 1.5px dashed rgba(0, 0, 0, 0.18);
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
        }

        .copy-button:active {
            background: rgba(0, 0, 0, 0.04);
        }

        .copy-button.copied {
            border-color: #2e9e4f;
            color: #2e9e4f;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <img src="logo.png" alt="Taste Logo" class="brand-logo">
            <p class="subtitle" id="operator-name">Contact the Team</p>
        </header>

        <main class="main-content" id="passport-content">
            <div class="card">
                <p class="contact-desc">Need immediate assistance? Tap a button below to call or text us.</p>

                <div class="contact-container">
                    <div class="contact-group">
                        <span class="contact-name">Ethan</span>
                        <a href="tel:+12087211548" class="phone-button">
                            <svg class="phone-icon" viewBox="0 0 24 24">
                                <path
                                    d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.96c.27-.27.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 2.7 3 3.24 3 3.99 3 13.28 10.73 21 20.03 21c.73 0 1.28-.59 1.28-1.13v-3.49c0-.55-.45-.99-.99-.99z" />
                            </svg>
                            Call Ethan
                        </a>
                        <a href="sms:+12087211548" class="sms-button">
                            <svg class="phone-icon" viewBox="0 0 24 24">
                                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
                            </svg>
                            Text Ethan
                        </a>
                        <button class="copy-button" onclick="copyNumber(this, '+12087211548', '(208) 721-1548')">📋 Copy
                            number</button>
                    </div>

                    <div class="contact-group">
                        <span class="contact-name">Cass</span>
                        <a href="tel:+17063023422" class="phone-button">
                            <svg class="phone-icon" viewBox="0 0 24 24">
                                <path
                                    d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.96c.27-.27.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 2.7 3 3.24 3 3.99 3 13.28 10.73 21 20.03 21c.73 0 1.28-.59 1.28-1.13v-3.49c0-.55-.45-.99-.99-.99z" />
                            </svg>
                            Call Cass
                        </a>
                        <a href="sms:+17063023422" class="sms-button">
                            <svg class="phone-icon" viewBox="0 0 24 24">
                                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" />
                            </svg>
                            Text Cass
                        </a>
                        <button class="copy-button" onclick="copyNumber(this, '+17063023422', '(706) 302-3422')">📋 Copy
                            number</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function copyNumber(btn, raw, display) {
            navigator.clipboard.writeText(raw).then(() => {
                btn.textContent = '✓ Copied ' + display;
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copy number';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                // Fallback for older browsers
                btn.textContent = display;
                btn.select && btn.select();
            });
        }
    </script>
</body>

</html>
