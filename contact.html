<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact Taste Tour</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .contact-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .phone-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            max-width: 300px;
            padding: 1.25rem 1.5rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }

        .phone-button:active {
            transform: scale(0.98);
        }

        .phone-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .contact-desc {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="header">
            <img src="logo.png" alt="Taste Logo" class="brand-logo">
            <p class="subtitle" id="operator-name">Contact the Team</p>
        </header>

        <main class="main-content" id="passport-content">
            <div class="card">
                <p class="contact-desc">Need immediate assistance? Tap a button below to call us directly.</p>

                <div class="contact-container">
                    <!-- Replace the href with Ethan's actual phone number -->
                    <a href="tel:+12087211548" class="phone-button">
                        <svg class="phone-icon" viewBox="0 0 24 24">
                            <path
                                d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.96c.27-.27.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 2.7 3 3.24 3 3.99 3 13.28 10.73 21 20.03 21c.73 0 1.28-.59 1.28-1.13v-3.49c0-.55-.45-.99-.99-.99zM15 1h6v6h-2V4.41l-5.29 5.3-1.41-1.42L17.59 3H15V1z" />
                        </svg>
                        Call Ethan
                    </a>

                    <!-- Replace the href with Cass's actual phone number -->
                    <a href="tel:+17063023422" class="phone-button">
                        <svg class="phone-icon" viewBox="0 0 24 24">
                            <path
                                d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.96c.27-.27.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 2.7 3 3.24 3 3.99 3 13.28 10.73 21 20.03 21c.73 0 1.28-.59 1.28-1.13v-3.49c0-.55-.45-.99-.99-.99zM15 1h6v6h-2V4.41l-5.29 5.3-1.41-1.42L17.59 3H15V1z" />
                        </svg>
                        Call Cass
                    </a>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
